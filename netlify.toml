[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  ASTRO_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "24"
  PNPM_VERSION = "11.9.0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
