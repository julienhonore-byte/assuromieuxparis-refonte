[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  ASTRO_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "24"
  PNPM_VERSION = "11.9.0"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Robots-Tag = "noindex, nofollow, noarchive"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), autoplay=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# La confidentialité de la préproduction doit être activée dans l'interface
# Netlify avant tout déploiement : Team login ou Password Protection.
# Aucune redirection candidate n'est activée sans validation du crawl historique
# et de docs/PLAN-REDIRECTIONS.md.
