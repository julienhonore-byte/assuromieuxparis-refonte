[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  ASTRO_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "24"
  PNPM_VERSION = "11.9.0"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), autoplay=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# La confidentialité de la préproduction doit être activée dans l'interface
# Netlify avant tout déploiement : Team login ou Password Protection.
# Le build génère dist/_headers avec X-Robots-Tag en mode privé. Il ne l'omet
# que si PUBLIC_SITE_INDEXABLE=true ET CONTEXT=production, en complément de la
# sélection par route. Netlify fournit CONTEXT automatiquement ; une Deploy
# Preview ou un branch deploy reste bloqué même si la variable publique vaut true.
# Aucune redirection candidate n'est activée sans validation du crawl historique
# et de docs/PLAN-REDIRECTIONS.md.
